<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Insert Page</title>
</head>
<body>
<h1>메모장 등록</h1>

<form name="InsertForm" method="post" action="/memo/insertProc">
    <fieldset>
        제목 : <input type="text" name="subject"><br>
        내용 :<textarea name="content" style="width:300px; height:500px;"></textarea><br>
        작성자 :<input type="text" name="writer"><br>
    <button type="submit">등록하기</button>
        <button type="button" th:onclick="|location.href='@{/memo/list}'|">목록</button>
    </fieldset>
</form>
</body>
</html>
